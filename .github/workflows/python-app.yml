name: CI

on: [push]

concurrency: playbypost  # Places all jobs in the same concurrency group

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Store GDrive credentials
      env:
        GDRIVE_B64: ${{ secrets.GDRIVE_B64 }}
      run: |
        echo "$GDRIVE_B64" | base64 --decode > ./creds/gdrive/token.pickle
    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: "3.13"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[test]
    - name: Run the precommit as linter
      run: |
        - pip install pre-commit
        - pre-commit run -a
    - name: Test with pytest
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      run: |
        pytest --cov=modron tests/
    - name: Coveralls
      run: |
        pip install coveralls
        coveralls --service=github
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
